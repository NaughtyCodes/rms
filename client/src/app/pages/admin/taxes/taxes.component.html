<div class="page-header">
    <div>
        <h1 class="page-title">Tax Management</h1>
        <p class="page-subtitle">Configure centralized tax slabs for easy product & category creation.</p>
    </div>
</div>

<div class="grid-2">
    <!-- List Taxes -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Active Tax Slabs</h2>
        </div>
        
        <div *ngIf="isLoading" class="p-16 text-center text-muted">Loading...</div>
        
        <div *ngIf="!isLoading && taxes.length === 0" class="p-16 text-center text-muted">
            No tax slabs configured yet.
        </div>

        <div class="list-group" *ngIf="taxes.length > 0">
            <div class="list-item flex items-center justify-between" *ngFor="let tax of taxes; let i = index">
                <div>
                    <div class="fw-600">{{ tax.name }}</div>
                    <div class="text-muted" style="font-size: 13px;">Rate: {{ tax.rate }}%</div>
                </div>
                <button class="btn btn-danger btn-sm" (click)="deleteTax(tax.id!, i)">Deactivate</button>
            </div>
        </div>
    </div>

    <!-- Add Tax Form -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Create New Tax Slab</h2>
        </div>

        <form (ngSubmit)="addTax()" class="flex-col gap-12 p-16">
            <div class="form-group">
                <label class="form-label">Slab Name</label>
                <input type="text" class="form-input" [(ngModel)]="newTax.name" name="name" required placeholder="e.g. GST 18%, VAT 5%">
            </div>

            <div class="form-group">
                <label class="form-label">Tax Rate (%)</label>
                <input type="number" class="form-input" [(ngModel)]="newTax.rate" name="rate" required step="0.01" min="0">
            </div>

            <div class="mt-8 flex items-center justify-between">
                <button type="submit" class="btn btn-primary" [disabled]="isLoading || !newTax.name || newTax.rate === null">
                    Add Tax Slab
                </button>
                <span class="text-success fw-600" *ngIf="message">{{ message }}</span>
            </div>
        </form>
    </div>
</div>

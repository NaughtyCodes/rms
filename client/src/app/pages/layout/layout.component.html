<div class="app-layout" [class.collapsed]="sidebarCollapsed">
    <!-- Mobile Overlay -->
    <div class="mobile-overlay" *ngIf="mobileMenuOpen" (click)="closeMobileMenu()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" [class.mobile-open]="mobileMenuOpen">
        <div class="sidebar-brand">
            <img src="/assets/logo.jpg" alt="Tracly" class="brand-logo">
            <span class="brand-text" *ngIf="!sidebarCollapsed">Tracly</span>
        </div>

        <nav class="sidebar-nav">
            <ng-container *ngFor="let item of navItems">
                <a [routerLink]="item.path" routerLinkActive="active" 
                   [routerLinkActiveOptions]="item.children ? {exact: true} : {exact: false}" 
                   class="nav-item" (click)="closeMobileMenu()">
                    <span class="nav-icon">{{ item.icon }}</span>
                    <span class="nav-label" *ngIf="!sidebarCollapsed">{{ item.label }}</span>
                </a>
                
                <!-- Nested Children Items -->
                <div class="nav-children" *ngIf="item.children && !sidebarCollapsed">
                    <a *ngFor="let child of item.children" [routerLink]="child.path" routerLinkActive="active" 
                       class="nav-item child-item" (click)="closeMobileMenu()">
                        <span class="nav-icon">{{ child.icon }}</span>
                        <span class="nav-label">{{ child.label }}</span>
                    </a>
                </div>
            </ng-container>
        </nav>

        <div class="sidebar-footer">
            <a href="/user-guide" target="_blank" class="sidebar-link" style="text-decoration: none;">
                <span class="nav-icon">📖</span>
                <span class="nav-label" *ngIf="!sidebarCollapsed">User Guide</span>
            </a>
            <button class="sidebar-link logout-btn" (click)="auth.logout()">
                <span class="nav-icon">🚪</span>
                <span class="nav-label" *ngIf="!sidebarCollapsed">Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main content -->
    <div class="main-area">
        <header class="top-header" [class.scrolled]="isScrolled">
            <div class="header-left">
                <button class="hamburger-btn" (click)="toggleSidebar()">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <button class="mobile-hamburger" (click)="toggleMobileMenu()">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>

            <div class="header-right">
                <span class="header-datetime">{{ today | date:'mediumDate' }} · {{ today | date:'shortTime' }}</span>
                <a href="/user-guide" target="_blank" class="header-icon-btn" title="User Guide">📖</a>
                <button class="header-icon-btn" (click)="toggleTheme()" title="Toggle Theme">
                    <span *ngIf="(settingsService.settings$ | async)?.theme === 'dark'">☀️</span>
                    <span *ngIf="(settingsService.settings$ | async)?.theme === 'light'">🌙</span>
                </button>
                <div class="header-user">
                    <div class="header-avatar">{{ getUserInitial() }}</div>
                    <div class="header-user-info">
                        <span class="header-user-name">{{ auth.getUser()?.fullName || auth.getUser()?.username }}</span>
                        <span class="header-user-role">{{ auth.getUser()?.role | titlecase }}</span>
                    </div>
                </div>
            </div>
        </header>
        <main class="content" (scroll)="onContentScroll($event)">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>

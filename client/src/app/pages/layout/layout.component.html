<div class="app-layout" [class.collapsed]="sidebarCollapsed">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon">🏪</span>
            <span class="brand-text" *ngIf="!sidebarCollapsed">ShopBill Pro</span>
        </div>

        <nav class="sidebar-nav">
            <ng-container *ngFor="let item of navItems">
                <a [routerLink]="item.path" routerLinkActive="active" 
                   [routerLinkActiveOptions]="item.children ? {exact: true} : {exact: false}" 
                   class="nav-item">
                    <span class="nav-icon">{{ item.icon }}</span>
                    <span class="nav-label" *ngIf="!sidebarCollapsed">{{ item.label }}</span>
                </a>
                
                <!-- Nested Children Items -->
                <div class="nav-children" *ngIf="item.children && !sidebarCollapsed">
                    <a *ngFor="let child of item.children" [routerLink]="child.path" routerLinkActive="active" class="nav-item child-item">
                        <span class="nav-icon">{{ child.icon }}</span>
                        <span class="nav-label">{{ child.label }}</span>
                    </a>
                </div>
            </ng-container>
        </nav>

    <div class="sidebar-footer">
            <div class="user-info" *ngIf="!sidebarCollapsed">
                <div class="user-avatar">{{ (auth.getUser()?.fullName || 'U')[0] }}</div>
                <div class="user-details">
                    <span class="user-name">{{ auth.getUser()?.fullName || auth.getUser()?.username }}</span>
                    <span class="user-role">{{ auth.getUser()?.role | titlecase }}</span>
                </div>
            </div>
            <a href="/user-guide" target="_blank" class="btn btn-outline btn-sm guide-btn" style="width: 100%; margin-bottom: 8px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; border: 1px solid rgba(99,102,241,0.3); border-radius: 8px; color: var(--primary-color, #6366f1); background: transparent; cursor: pointer; font-size: 13px;">
                <span>📖</span>
                <span *ngIf="!sidebarCollapsed">User Guide</span>
            </a>
            <button class="btn btn-danger btn-sm" (click)="auth.logout()" style="width: 100%;">
                <span>🚪</span>
                <span *ngIf="!sidebarCollapsed">Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main content -->
    <div class="main-area">
        <header class="top-header">
            <button class="toggle-btn" (click)="toggleSidebar()">☰</button>
            <div class="header-right">
                <a href="/user-guide" target="_blank" class="toggle-btn" title="User Guide" style="text-decoration: none;">📖</a>
                <button class="toggle-btn" (click)="toggleTheme()" title="Toggle Theme">
                    <span *ngIf="(settingsService.settings$ | async)?.theme === 'dark'">☀️</span>
                    <span *ngIf="(settingsService.settings$ | async)?.theme === 'light'">🌙</span>
                </button>
                <span class="datetime">{{ today | date:'medium' }}</span>
            </div>
        </header>
        <main class="content">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
